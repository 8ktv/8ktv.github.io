<script>
    document.addEventListener("DOMContentLoaded", () => {
        const text = "PLVSMVWVRE";
        const target = document.getElementById("typewriter-target");
        const logoParallax = document.getElementById("logo-parallax");
        let index = 0;

        let isDeleting = false;

        function type() {
            if (!isDeleting) {
                if (index < text.length) {
                    target.textContent += text.charAt(index);
                    index++;
                    const organicDelay = Math.floor(Math.random() * 100) + 80;
                    setTimeout(type, organicDelay);
                } else {
                    isDeleting = true;
                    setTimeout(type, 2000);
                }
            } else {
                if (index > 0) {
                    target.textContent = text.substring(0, index - 1);
                    index--;
                    const organicDelay = Math.floor(Math.random() * 50) + 40;
                    setTimeout(type, organicDelay);
                } else {
                    isDeleting = false;
                    setTimeout(type, 800);
                }
            }
        }

        setTimeout(type, 800);

        const communityLink = document.getElementById("community-link");
        const downloadBtn = document.getElementById("download-btn");
        const downloadTip = document.getElementById("download-tip");
        const whiteFlash = document.getElementById("white-flash");
        const logoImageContainer = document.getElementById("logo-image-container");
        let tipTimeout;
        let isAnimating = false;

        function triggerFlashAnimation(clickedElement, onPeak) {
            if (isAnimating) return;
            isAnimating = true;

            // Save original styles
            const originalTransition = clickedElement.style.transition;
            const originalTransform = clickedElement.style.transform;
            const originalFilter = clickedElement.style.filter;
            const originalColor = clickedElement.style.color;

            // Fast zoom scale and white fade on clicked element
            clickedElement.style.transition = "transform 400ms cubic-bezier(0.16, 1, 0.3, 1), filter 400ms, color 400ms";
            clickedElement.style.transform = "scale(18)";
            clickedElement.style.filter = "brightness(10) blur(1px)";
            clickedElement.style.color = "#ffffff";
            clickedElement.style.zIndex = "50";

            // Logo zooms in/scales up concurrently
            if (logoImageContainer) {
                logoImageContainer.style.transition = "transform 400ms cubic-bezier(0.16, 1, 0.3, 1)";
                logoImageContainer.style.transform = "scale(1.8)";
            }

            // Bring in white flash to 100% opacity
            whiteFlash.style.transition = "opacity 400ms cubic-bezier(0.16, 1, 0.3, 1)";
            whiteFlash.classList.remove("pointer-events-none");
            whiteFlash.classList.remove("opacity-0");
            whiteFlash.classList.add("opacity-100");

            // Peak trigger
            setTimeout(() => {
                if (onPeak) onPeak();

                // Slower recovery fade out
                setTimeout(() => {
                    whiteFlash.style.transition = "opacity 850ms cubic-bezier(0.16, 1, 0.3, 1)";
                    whiteFlash.classList.remove("opacity-100");
                    whiteFlash.classList.add("opacity-0");
                    whiteFlash.classList.add("pointer-events-none");

                    clickedElement.style.transition = "transform 850ms cubic-bezier(0.16, 1, 0.3, 1), filter 850ms, color 850ms";
                    clickedElement.style.transform = originalTransform || "scale(1)";
                    clickedElement.style.filter = originalFilter || "";
                    clickedElement.style.color = originalColor || "";

                    if (logoImageContainer) {
                        logoImageContainer.style.transition = "transform 850ms cubic-bezier(0.16, 1, 0.3, 1)";
                        logoImageContainer.style.transform = "scale(1)";
                    }

                    // Fully restore interaction
                    setTimeout(() => {
                        clickedElement.style.transition = originalTransition;
                        clickedElement.style.zIndex = "";
                        isAnimating = false;
                    }, 850);
                }, 100);
            }, 400);
        }

        communityLink.addEventListener("click", (e) => {
            e.preventDefault();
            triggerFlashAnimation(communityLink, () => {
                window.open(communityLink.href, "_blank");
            });
        });

        downloadBtn.addEventListener("click", () => {
            triggerFlashAnimation(downloadBtn, () => {
                clearTimeout(tipTimeout);
                downloadTip.classList.remove("opacity-0", "translate-y-1");
                downloadTip.classList.add("opacity-100", "translate-y-0");

                tipTimeout = setTimeout(() => {
                    downloadTip.classList.remove("opacity-100", "translate-y-0");
                    downloadTip.classList.add("opacity-0", "translate-y-1");
                }, 3000);
            });
        });

        const soundtrackToggle = document.getElementById("soundtrack-toggle");
        const spotifyPanel = document.getElementById("spotify-panel");
        const spotifyIframe = document.getElementById("spotify-iframe");
        const trackItems = document.querySelectorAll(".track-item");
        let isSpotifyOpen = false;

        soundtrackToggle.addEventListener("click", () => {
            isSpotifyOpen = !isSpotifyOpen;
            if (isSpotifyOpen) {
                spotifyPanel.classList.remove("translate-y-3", "opacity-0", "pointer-events-none");
                spotifyPanel.classList.add("translate-y-0", "opacity-100", "pointer-events-auto");
                soundtrackToggle.classList.add("bg-[#F5F5F3]/15", "border-[#F5F5F3]/40");
            } else {
                spotifyPanel.classList.remove("translate-y-0", "opacity-100", "pointer-events-auto");
                spotifyPanel.classList.add("translate-y-3", "opacity-0", "pointer-events-none");
                soundtrackToggle.classList.remove("bg-[#F5F5F3]/15", "border-[#F5F5F3]/40");
            }
        });

        function playTrack(btn) {
            // Reset all track items styling
            trackItems.forEach((item) => {
                item.className = "track-item w-full flex items-center justify-between p-2 rounded-lg bg-transparent border border-[#F5F5F3]/5 hover:border-[#F5F5F3]/15 hover:bg-[#F5F5F3]/5 text-left transition-all duration-200 cursor-pointer";
                const titleSp = item.querySelector("span:first-child");
                const artistSp = item.querySelector("span:nth-child(2)");
                if (titleSp) titleSp.className = "text-[#F5F5F3]/70 font-medium truncate text-[10px]";
                if (artistSp) artistSp.className = "text-[#F5F5F3]/40 text-[8px] truncate mt-0.5";
            });

            // Activate current item styling
            btn.className = "track-item active w-full flex items-center justify-between p-2 rounded-lg bg-[#F5F5F3]/5 border border-[#F5F5F3]/20 hover:border-[#F5F5F3]/30 hover:bg-[#F5F5F3]/10 text-left transition-all duration-200 cursor-pointer";
            const btnTitle = btn.querySelector("span:first-child");
            const btnArtist = btn.querySelector("span:nth-child(2)");
            if (btnTitle) btnTitle.className = "text-[#F5F5F3] font-medium truncate text-[10px]";
            if (btnArtist) btnArtist.className = "text-[#F5F5F3]/50 text-[8px] truncate mt-0.5";

            // Dynamic Now Playing soundtrack label
            const soundtrackTextEle = document.getElementById("soundtrack-text");
            if (soundtrackTextEle && btnTitle) {
                soundtrackTextEle.textContent = `Now playing: ${btnTitle.textContent}`;
            }

            // Update embedded player source
            const rawUrl = btn.getAttribute("data-url");
            const encodedUrl = encodeURIComponent(rawUrl);
            spotifyIframe.src = `https://w.soundcloud.com/player/?url=${encodedUrl}&color=%23121212&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false`;
        }

        trackItems.forEach((btn) => {
            btn.addEventListener("click", () => {
                playTrack(btn);
            });
        });

        // Play random song on entry
        if (trackItems.length > 0) {
            const randomIndex = Math.floor(Math.random() * trackItems.length);
            playTrack(trackItems[randomIndex]);
        }

        document.addEventListener("mousemove", (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2) * -18;
            const moveY = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2) * -18;
            logoParallax.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    });
</script>

</body>
</html>
