            url: 'https://vp.net/l/en-US/'
        },
    ];

    const Icon = ({ name, ...props }) => {
        useEffect(() => { lucide.createIcons(); }, [name]);
        return <i data-lucide={name} {...props}></i>;
    };

    const FeatureBadge = ({ label, tooltip }) => (
        <div className="group/badge relative inline-block">
            <div className="flex flex-col min-w-[36px] overflow-hidden rounded-[1px] border border-white/5 shadow-2xl cursor-help transition-all hover:border-gold/50">
                <div className="bg-gold text-[6px] font-black text-black px-2 py-0.5 text-center leading-none uppercase tracking-tighter">
                    {label}
                </div>
                <div className="bg-white/90 h-0.5 w-full"></div>
            </div>
            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-surface border border-white/20 text-[9px] text-gray-300 font-mono uppercase tracking-[0.2em] whitespace-nowrap opacity-0 group-hover/badge:opacity-100 transition-all pointer-events-none z-[100] shadow-2xl backdrop-blur-md scale-95 group-hover/badge:scale-100 origin-bottom">
                <span className="text-gold mr-2 font-bold">•</span>
                {tooltip}
            </div>
        </div>
    );

    const JurisdictionBadge = ({ level }) => {
        const colors = {
            [JurisdictionLevel.SAFE]: 'bg-[#14F195]/10 text-[#14F195] border-[#14F195]/20',
            [JurisdictionLevel.FOURTEEN_EYES]: 'bg-yellow-900/10 text-yellow-500 border-yellow-900/20',
            [JurisdictionLevel.NINE_EYES]: 'bg-orange-900/10 text-orange-500 border-orange-900/20',
            [JurisdictionLevel.FIVE_EYES]: 'bg-red-900/10 text-red-500 border-red-900/20',
            [JurisdictionLevel.RISKY]: 'bg-purple-900/10 text-purple-400 border-purple-900/20',
        };

        const descriptions = {
            [JurisdictionLevel.SAFE]: 'Minimal surveillance risk. Data isolation.',
            [JurisdictionLevel.FOURTEEN_EYES]: 'Collaborative intelligence sharing zone.',
            [JurisdictionLevel.NINE_EYES]: 'Extended intelligence sharing agreement.',
            [JurisdictionLevel.FIVE_EYES]: 'Highest data-sharing integration. Extreme surveillance.',
            [JurisdictionLevel.RISKY]: 'Opaque legal landscape or high interference risk.',
        };

        return (
            <div className="group/j relative inline-block">
                    <span className={`px-2 py-0.5 text-[8px] font-bold uppercase tracking-widest border rounded-[1px] cursor-help ${colors[level]}`}>
                        {level}
                    </span>
                <div className="absolute top-full left-0 mt-2 w-48 p-2 bg-surface border border-white/10 text-[9px] text-gray-400 font-mono uppercase tracking-wider opacity-0 group-hover/j:opacity-100 transition-opacity z-[90] shadow-2xl backdrop-blur-md">
                    {descriptions[level]}
                </div>
            </div>
        );
    };

    const MetricDots = ({ label, active }) => (
        <div className="flex flex-col items-end gap-1">
            <div className="flex gap-1">
                {[1, 2, 3].map((i) => (
                    <div
                        key={i}
                        className={`w-1.5 h-1.5 rounded-[1px] ${i <= active ? 'bg-[#14F195]' : 'bg-white/10'}`}
                    />
                ))}
            </div>
            <span className="text-[9px] text-gray-600 font-bold uppercase tracking-widest">{label}</span>
        </div>
    );

    const VPNCard = ({ vpn, isSelected, onToggleSelect }) => {
        const [isExpanded, setIsExpanded] = useState(false);

        const calculateScore = () => {
            let score = 0;

            // Logs Audit (Max 8.0)
            if (vpn.metrics.logs === 'No Logs') score += 8.0;
            else if (vpn.metrics.logs === 'Timestamps' || vpn.metrics.logs.includes('Bandwidth')) score += 5.0;
            else score += 3.0;

            // Jurisdiction (Max 1.0)
            if (vpn.jurisdiction.level === JurisdictionLevel.SAFE) score += 1.0;
            else if (vpn.jurisdiction.level === JurisdictionLevel.FOURTEEN_EYES) score += 0.5;
            else score += 0.2;

            // Infrastructure (Max 0.5)
            if (vpn.metrics.diskless) score += 0.5;

            // Transparency/Open Source (Max 0.5)
            if (vpn.metrics.features.includes('Open Source')) score += 0.5;

            return Math.min(10, score);
        };

        const score = calculateScore();

        return (
            <div className={`bg-card/40 border ${isSelected ? 'border-gold shadow-[0_0_20px_rgba(197,160,89,0.05)]' : 'border-white/5'} rounded-[1px] hover:border-gold/20 transition-all duration-300 fade-in group`}>
                <div className="p-8">
                    <div className="flex items-center gap-10">
                        <div className="shrink-0">
                            <button
                                onClick={() => onToggleSelect(vpn.id)}
                                className={`w-5 h-5 border rounded-[1px] flex items-center justify-center transition-all ${isSelected ? 'bg-gold border-gold text-surface' : 'border-white/10 hover:border-gold/30'}`}
                            >
                                {isSelected && <Icon name="check" className="w-3 h-3" />}
                            </button>
                        </div>

                        <div className="w-12 h-12 shrink-0 bg-white/[0.03] border border-white/10 flex items-center justify-center text-gold font-serif italic text-xl group-hover:border-gold/40 transition-colors">
                            {vpn.name.charAt(0)}
                        </div>

                        <div className="flex-grow">
                            <div className="flex items-center gap-4 mb-3">
                                <h3 className="text-xl font-medium tracking-tight text-white">{vpn.name}</h3>
                                <JurisdictionBadge level={vpn.jurisdiction.level} />
                            </div>
                            <div className="flex gap-1.5 flex-wrap">
                                {vpn.metrics.logs === 'No Logs' && <FeatureBadge label="TRANS" tooltip="Transparency Audit" />}
                                {(vpn.id === 'mullvad' || vpn.id === 'ivpn' || vpn.id === 'proton' || vpn.id === 'ovpn') && <FeatureBadge label="1ST" tooltip="1st Party Servers" />}
                                {vpn.metrics.encryption.includes('256') && <FeatureBadge label="NATIVE" tooltip="Native Encryption" />}
                                {vpn.metrics.features.some(f => f.toLowerCase().includes('core') || f.toLowerCase().includes('hop')) && <FeatureBadge label="M" tooltip="Multi-hop Ready" />}
                                {vpn.jurisdiction.level === JurisdictionLevel.SAFE && <FeatureBadge label="Y" tooltip="Neutral Zone" />}
                                {vpn.metrics.diskless && <FeatureBadge label="RAM" tooltip="Diskless / RAM-only Infrastructure" />}
                                {vpn.metrics.features.length > 2 && <FeatureBadge label="TOTAL CO" tooltip="Total Control" />}
                            </div>
                        </div>

                        <div className="shrink-0 flex items-center gap-16">
                            <MetricDots
                                label={vpn.metrics.logs === 'No Logs' ? "No Logs" : "Bandwidth"}
                                active={vpn.metrics.logs === 'No Logs' ? 3 : (vpn.id === 'nord' ? 2 : 1)}
                            />

                            <div className="text-right min-w-[100px]">
                                <div className="text-3xl font-serif italic text-gold mb-0">{score.toFixed(1)}</div>
                                <div className="text-[9px] text-gray-600 block uppercase tracking-widest font-bold">Technical Rank</div>
                            </div>

                            <div className="min-w-[80px] text-right">
                                <button
                                    onClick={() => setIsExpanded(!isExpanded)}
                                    className="flex items-center gap-2 text-[9px] uppercase tracking-[0.3em] text-gray-500 hover:text-gold transition-all font-bold group/details ml-auto"
                                >
                                    Details
                                    <Icon name={isExpanded ? "chevron-up" : "chevron-right"} className="w-3 h-3 group-hover/details:translate-x-1" />
                                </button>
                            </div>
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="pt-8 border-t border-white/5 mt-8 grid grid-cols-1 md:grid-cols-3 gap-12 fade-in">
                            <div className="space-y-6">
                                <section>
                                    <h4 className="text-[10px] uppercase tracking-[0.25em] text-gold mb-4 flex items-center gap-2">
                                        <Icon name="shield" className="w-3 h-3" /> Security
                                    </h4>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-[11px] border-b border-white/5 pb-2">
                                            <span className="text-gray-500 uppercase tracking-widest">Protocol</span>
                                            <span className="text-gray-200 font-mono italic">WireGuard / IKEv2</span>
                                        </div>
                                        <div className="flex justify-between text-[11px] border-b border-white/5 pb-2">
                                            <span className="text-gray-500 uppercase tracking-widest">Encryption</span>
                                            <span className="text-gray-200 font-mono">{vpn.metrics.encryption}</span>
                                        </div>
                                        <div className="flex justify-between text-[11px] border-b border-white/5 pb-2">
                                            <span className="text-gray-500 uppercase tracking-widest">Infrastructure</span>
                                            <span className="text-gray-200 font-mono italic tracking-tighter">{vpn.metrics.diskless ? 'Diskless RAM-Only Nodes' : 'Standard Disk Infrastructure'}</span>
                                        </div>
                                    </div>
                                </section>
                            </div>
                            <div className="space-y-6">
                                <section>
                                    <h4 className="text-[10px] uppercase tracking-[0.25em] text-gold mb-4 flex items-center gap-2">
                                        <Icon name="globe" className="w-3 h-3" /> Network
                                    </h4>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-[11px] border-b border-white/5 pb-2">
                                            <span className="text-gray-500 uppercase tracking-widest">Nodes</span>
                                            <span className="text-gray-200 font-mono">{vpn.metrics.servers.toLocaleString()}+</span>
                                        </div>
                                        <div className="flex justify-between text-[11px] border-b border-white/5 pb-2">
                                            <span className="text-gray-500 uppercase tracking-widest">Territories</span>
                                            <span className="text-gray-200 font-mono">{vpn.metrics.countries} Countries</span>
                                        </div>
                                        <div className="flex justify-between text-[11px] border-b border-white/5 pb-2">
                                            <span className="text-gray-500 uppercase tracking-widest">Devices</span>
                                            <span className="text-gray-200 font-mono">{vpn.metrics.maxDevices}</span>
                                        </div>
                                    </div>
                                </section>
                            </div>
                            <div className="col-span-1 flex flex-col justify-between">
                                <p className="text-xs text-gray-500 font-serif italic leading-relaxed opacity-60 mb-8">
                                    {vpn.description}
                                </p>
                                <a href={vpn.url} target="_blank" className="block w-full py-3 border border-gold/30 text-gold font-bold text-[10px] uppercase tracking-[0.3em] text-center hover:bg-gold hover:text-surface transition-all">Intel Access</a>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    };

    const CompareView = ({ providers, onBack }) => (
        <div className="space-y-12 fade-in">
            <div className="flex items-center justify-between border-b border-white/5 pb-8">
                <div>
                    <h2 className="text-4xl font-serif italic text-gold">Comparative Analysis</h2>
                    <p className="text-[10px] uppercase tracking-[0.3em] text-gray-500 mt-2">TECHNICAL SPECIFICATION BREAKDOWN</p>
                </div>
                <button onClick={onBack} className="px-6 py-3 border border-white/10 text-white text-[10px] uppercase tracking-widest hover:bg-white/5 transition-all flex items-center gap-2">
                    <Icon name="arrow-left" className="w-3 h-3" /> Back
                </button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-px bg-white/5 border border-white/5">
                {providers.map(vpn => (
                    <div key={vpn.id} className="bg-surface p-8 space-y-8 min-w-[300px]">
                        <div className="text-center space-y-4">
                            <div className="w-16 h-16 bg-gold/10 border border-gold/20 rounded-full flex items-center justify-center text-gold font-serif italic text-2xl mx-auto">{vpn.name.charAt(0)}</div>
                            <h3 className="text-xl font-medium tracking-tight text-white">{vpn.name}</h3>
                            <JurisdictionBadge level={vpn.jurisdiction.level} />
                        </div>
                        <div className="space-y-4 text-xs font-mono">
                            <div className="border-b border-white/5 pb-2">
                                <span className="text-gold block mb-1">Logs</span>
                                {vpn.metrics.logs}
                            </div>
                            <div className="border-b border-white/5 pb-2">
                                <span className="text-gold block mb-1">Encryption</span>
                                {vpn.metrics.encryption}
                            </div>
                            <div className="border-b border-white/5 pb-2">
                                <span className="text-gold block mb-1">Nodes</span>
                                {vpn.metrics.servers}
                            </div>
                        </div>
                        <a href={vpn.url} target="_blank" className="block w-full py-3 bg-white/5 border border-white/10 text-[10px] uppercase tracking-widest text-center text-gray-400 hover:text-white transition-all">Intel</a>
                    </div>
                ))}
            </div>
        </div>
    );

    const Wizard = ({ onComplete }) => {
        const [step, setStep] = useState(0);
        const [answers, setAnswers] = useState([]);

        const questions = [
            {
                id: 'objective',
                q: "Select Primary Objective",
                options: ["Technical Privacy", "Media Access", "Network Velocity", "Maximum Sovereignty"]
            },
            {
                id: 'proficiency',
                q: "Network Proficiency",
                options: ["Basic Usage", "Advanced Config Labs"]
            },
            {
                id: 'allocation',
                q: "Resource Allocation",
                options: ["Zero Cost Required", "Maximum Sovereignty"]
            }
        ];

        const handleAnswer = (option) => {
            const newAnswers = [...answers, option];
            if (step < questions.length - 1) {
                setAnswers(newAnswers);
                setStep(step + 1);
            } else {
                const filters = {
                    jurisdiction: [],
                    features: [],
                    payment: [],
                    free: false
                };
                if (newAnswers.includes("Technical Privacy")) filters.features.push("No Logs");
                if (newAnswers.includes("Maximum Sovereignty")) {
                    filters.jurisdiction = [JurisdictionLevel.SAFE];
                    filters.payment.push("XMR");
                }
                if (newAnswers.includes("Zero Cost Required")) filters.free = true;
                onComplete(filters);
            }
        };

        return (
            <div className="max-w-2xl mx-auto py-20 fade-in">
                <div className="space-y-12">
                    <div className="space-y-4">
                        <span className="text-[10px] uppercase tracking-[0.4em] text-gold font-bold">Step 0{step + 1} / 03</span>
                        <h2 className="text-4xl font-serif italic text-white">{questions[step].q}</h2>
                    </div>
                    <div className="grid gap-4">
                        {questions[step].options.map(opt => (
                            <button
                                key={opt}
                                onClick={() => handleAnswer(opt)}
                                className="p-6 border border-white/10 bg-white/[0.02] text-left hover:border-gold/50 hover:bg-gold/5 transition-all group"
                            >
                                <div className="flex justify-between items-center">
                                    <span className="text-sm uppercase tracking-widest text-gray-400 group-hover:text-white transition-colors">{opt}</span>
                                    <Icon name="chevron-right" className="w-4 h-4 text-gold opacity-0 group-hover:opacity-100 transition-all" />
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    const App = () => {
        const [view, setView] = useState('home');
        const [search, setSearch] = useState('');
        const [selectedIds, setSelectedIds] = useState([]);
        const [jurisdictionFilter, setJurisdictionFilter] = useState([]);
        const [activeFeatures, setActiveFeatures] = useState([]);
        const [freeOnly, setFreeOnly] = useState(false);

        const filteredVPNs = useMemo(() => {
            const results = VPN_DATA.filter(vpn => {
                const matchesSearch = vpn.name.toLowerCase().includes(search.toLowerCase());
                const matchesJurisdiction = jurisdictionFilter.length === 0 || jurisdictionFilter.includes(vpn.jurisdiction.level);
                const matchesFeatures = activeFeatures.length === 0 || activeFeatures.every(f => vpn.metrics.features.includes(f) || vpn.metrics.logs === f);
                const matchesFree = !freeOnly || vpn.metrics.hasFreeTier;
                return matchesSearch && matchesJurisdiction && matchesFeatures && matchesFree;
            });

            // Calculate score-based sort
            return results.sort((a, b) => {
                const getScore = (v) => {
                    let score = 0;
                    if (v.metrics.logs === 'No Logs') score += 8.0;
                    else if (v.metrics.logs === 'Timestamps' || v.metrics.logs.includes('Bandwidth')) score += 5.0;
                    else score += 3.0;
                    if (v.jurisdiction.level === JurisdictionLevel.SAFE) score += 1.0;
                    else if (v.jurisdiction.level === JurisdictionLevel.FOURTEEN_EYES) score += 0.5;
                    else score += 0.2;
                    if (v.metrics.diskless) score += 0.5;
                    if (v.metrics.features.includes('Open Source')) score += 0.5;
                    return score;
                };
                return getScore(b) - getScore(a);
            });
        }, [search, jurisdictionFilter, activeFeatures, freeOnly]);

        const toggleSelection = (id) => {
            setSelectedIds(prev => prev.includes(id) ? prev.filter(sid => sid !== id) : [...prev, id]);
        };

        const handleWizardComplete = (filters) => {
            if (filters.jurisdiction.length > 0) setJurisdictionFilter(filters.jurisdiction);
            if (filters.features.length > 0) setActiveFeatures(filters.features);
            if (filters.free) setFreeOnly(true);
            setView('browser');
        };

        return (
            <div className="min-h-screen bg-surface text-gray-200">
                <nav className="sticky top-0 z-50 border-b border-white/10 bg-surface/90 backdrop-blur-md px-10 h-20 flex items-center justify-between">
                    <div className="cursor-pointer group" onClick={() => { setView('home'); setJurisdictionFilter([]); setActiveFeatures([]); setFreeOnly(false); }}>
                        <h1 className="text-2xl font-serif italic text-gold tracking-tight fade-right group-hover:mask-none transition-all duration-700">Verity Index</h1>
                        <p className="text-[9px] uppercase tracking-[0.25em] text-gray-600 -mt-1">Independent Privacy Audit</p>
                    </div>
                    <div className="flex gap-8 items-center text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">
                        <button onClick={() => setView('browser')} className={`hover:text-white ${view === 'browser' ? 'text-gold' : ''}`}>Directory</button>
                        <button onClick={() => setView('wizard')} className={`px-6 py-2 border border-white/10 text-white hover:bg-white/5 transition-all ${view === 'wizard' ? 'border-gold text-gold' : ''}`}>Launch</button>
                    </div>
                </nav>

                <main className="max-w-7xl mx-auto px-10 py-16">
                    {view === 'home' && (
                        <div className="py-20 fade-in">
                            <h1 className="text-7xl font-serif italic text-white mb-8 leading-[0.9]">Sovereignty is <br /> not a <span className="text-gold">Feature.</span></h1>
                            <p className="text-lg text-gray-400 max-w-xl mb-12 leading-relaxed opacity-70">Verity Index provides a technical audit of jurisdiction risk and encryption standards. No AI. Just Data.</p>
                            <div className="flex gap-4">
                                <button onClick={() => setView('wizard')} className="px-10 py-4 bg-gold text-surface font-black text-xs uppercase tracking-[0.25em] hover:bg-gold-hover transition-all">Launch Intelligence</button>
                                <button onClick={() => setView('browser')} className="px-10 py-4 border border-white/10 text-white font-black text-xs uppercase tracking-[0.25em] hover:bg-white/5 transition-all">Browse Directory</button>
                            </div>
                        </div>
                    )}

                    {view === 'wizard' && (
                        <Wizard onComplete={handleWizardComplete} />
                    )}

                    {view === 'browser' && (
                        <div className="flex gap-12 fade-in">
                            <aside className="w-80 hidden lg:block space-y-12">
                                <section>
                                    <div className="flex items-center justify-between mb-6 border-b border-white/5 pb-2">
                                        <h3 className="text-[10px] uppercase tracking-[0.25em] text-gold">Jurisdiction Risk</h3>
                                        {(jurisdictionFilter.length > 0 || freeOnly || activeFeatures.length > 0) && (
                                            <button
                                                onClick={() => { setJurisdictionFilter([]); setFreeOnly(false); setActiveFeatures([]); }}
                                                className="text-[9px] uppercase tracking-widest text-gold hover:text-white transition-colors underline decoration-gold/30 underline-offset-4"
                                            >
                                                Reset
                                            </button>
                                        )}
                                    </div>
                                    <div className="space-y-4">
                                        {Object.values(JurisdictionLevel).map(level => (
                                            <label key={level} className="flex items-center gap-3 text-xs uppercase tracking-widest cursor-pointer hover:text-white">
                                                <input
                                                    type="checkbox"
                                                    checked={jurisdictionFilter.includes(level)}
                                                    onChange={(e) => {
                                                        const checked = e.target.checked;
                                                        setJurisdictionFilter(prev => checked ? [...prev, level] : prev.filter(l => l !== level));
                                                    }}
                                                    className="accent-gold h-4 w-4"
                                                />
                                                <span className={`${jurisdictionFilter.includes(level) ? 'text-white' : 'text-gray-500'}`}>{level}</span>
                                            </label>
                                        ))}
                                    </div>
                                </section>

                                <section className="p-6 border border-white/5 bg-white/[0.02]">
                                    <h4 className="text-[9px] uppercase tracking-[0.3em] text-gold mb-4 font-bold flex items-center gap-2">
                                        <Icon name="info" className="w-3 h-3" /> Intelligence Brief
                                    </h4>
                                    <div className="space-y-4 text-[10px] text-gray-500 leading-relaxed font-mono uppercase tracking-tighter">
                                        <p><span className="text-white">5-Eyes:</span> Deep integration and bulk data sharing. (US, UK, CA, AU, NZ).</p>
                                        <p><span className="text-white">9-Eyes:</span> 5-Eyes + FR, NL, DK, NO. Broad EU collaboration.</p>
                                        <p><span className="text-white">14-Eyes:</span> SIGINT Seniors Europe. Collaborative intelligence exchange.</p>
                                        <p className="border-t border-white/10 pt-4 italic text-gray-600">VPNs in these zones are subject to secret subpoenas and gag orders that can bypass 'No Logs' claims.</p>
                                    </div>
                                </section>
                            </aside>
                            <div className="flex-1 space-y-8">
                                <div className="flex gap-4">
                                    <input
                                        type="text"
                                        placeholder="Search providers..."
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                        className="flex-1 bg-white/[0.02] border border-white/10 rounded-sm py-4 px-6 outline-none focus:border-gold/30"
                                    />
                                    <button
                                        onClick={() => view === 'browser' && selectedIds.length > 0 && setView('compare')}
                                        className={`px-8 py-4 ${selectedIds.length > 0 ? 'bg-gold text-surface' : 'bg-white/5 text-gray-600'} transition-all text-xs font-bold uppercase tracking-widest`}
                                    >
                                        Compare ({selectedIds.length})
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {filteredVPNs.map(vpn => (
                                        <VPNCard
                                            key={vpn.id}
                                            vpn={vpn}
                                            isSelected={selectedIds.includes(vpn.id)}
                                            onToggleSelect={toggleSelection}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'compare' && (
                        <CompareView
                            providers={VPN_DATA.filter(v => selectedIds.includes(v.id))}
                            onBack={() => setView('browser')}
                        />
                    )}
                </main>

                <footer className="border-t border-white/5 py-12 px-10 text-center opacity-30">
                    <p className="text-[10px] tracking-widest uppercase">&copy; 2026 Verity Index - Independent Audit</p>
                </footer>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
