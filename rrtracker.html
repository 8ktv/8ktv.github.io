<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rec Room Shutdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-2xl mx-auto p-8">

    <!-- Title -->
    <div class="text-center mb-12">
        <h1 class="text-5xl font-bold tracking-tighter mb-2">School’s Out</h1>
        <p class="text-zinc-400">Rec Room Final Shutdown</p>
    </div>

    <!-- Countdown -->
    <div class="bg-zinc-900 rounded-3xl p-8 mb-10">
        <div class="text-center mb-6">
            <p class="text-zinc-500 text-sm mb-2">TIME UNTIL SHUTDOWN</p>
            <div id="countdown" class="font-mono text-6xl font-bold tabular-nums tracking-tighter text-orange-400">
                00d 00h 00m 00s
            </div>
            <p class="text-xs text-zinc-500 mt-3" id="timezone"></p>
        </div>
    </div>

    <!-- Live Status -->
    <div class="mb-6 flex items-center justify-between">
        <h2 class="text-2xl font-semibold">Live RecNet Status</h2>
        <button onclick="pingAll()"
                class="flex items-center gap-2 bg-orange-600 hover:bg-orange-500 px-6 py-2 rounded-2xl text-sm font-medium">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            REFRESH
        </button>
    </div>

    <div id="serverList" class="space-y-3 mb-8"></div>

    <!-- Log -->
    <div id="pingLog" class="bg-zinc-900 rounded-3xl p-6 h-80 overflow-auto text-sm font-mono text-zinc-400"></div>

</div>

<div id="audio" class="hidden"></div>

<script>
    lucide.createIcons();
    document.getElementById('audio').innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/HJl-i58SuW4?autoplay=1&loop=1&playlist=HJl-i58SuW4" frameborder="0" allow="autoplay"></iframe>`;

    const SHUTDOWN_DATE = new Date('2026-06-01T12:00:00-07:00'); // June 1, 2026 12:00 PDT

    const servers = [
        { name: "ns.rec.net", url: "https://ns.rec.net/" },
        { name: "rec.net", url: "https://rec.net/" },
        { name: "api.rec.net", url: "https://api.rec.net/" },
        { name: "auth.rec.net", url: "https://auth.rec.net/" }
    ];

    let logs = [];

    function addLog(msg, isError = false) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        logs.unshift({ time, msg, isError });
        if (logs.length > 15) logs.pop();

        const logEl = document.getElementById('pingLog');
        logEl.innerHTML = logs.map(l => `
                <div class="flex gap-4 ${l.isError ? 'text-red-400' : 'text-emerald-400'}">
                    <span class="text-zinc-500 w-20">${l.time}</span>
                    <span>${l.msg}</span>
                </div>
            `).join('');
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function pingServer(s) {
        try {
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 7000);
            const start = Date.now();
            await fetch(s.url, { method: 'HEAD', mode: 'no-cors', signal: ctrl.signal });
            const ms = Date.now() - start;
            addLog(`${s.name} responded (${ms}ms)`);
            return `✅ ONLINE (${ms}ms)`;
        } catch (_) {
            addLog(`${s.name} unreachable`, true);
            return `❌ OFFLINE`;
        }
    }

    async function pingAll() {
        const container = document.getElementById('serverList');
        container.innerHTML = `<div class="text-center py-8 text-zinc-500">Checking RecNet...</div>`;

        for (let s of servers) {
            const status = await pingServer(s);
            const div = document.createElement('div');
            div.className = "bg-zinc-900 rounded-2xl px-6 py-4 flex justify-between items-center";
            div.innerHTML = `<div class="font-medium">${s.name}</div><div class="font-mono">${status}</div>`;
            container.appendChild(div);
        }
    }

    // Countdown
    function updateCountdown() {
        const now = new Date();
        const diff = SHUTDOWN_DATE - now;

        if (diff <= 0) {
            document.getElementById('countdown').innerHTML = `<span class="text-red-500">SHUTDOWN COMPLETE</span>`;
            document.getElementById('timezone').textContent = "June 1, 2026 • 12:00 PDT";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('countdown').textContent =
            `${days.toString().padStart(2, '0')}d ${hours.toString().padStart(2, '0')}h ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;

        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById('timezone').textContent = `Your timezone: ${tz}`;
    }

    // Init
    setInterval(updateCountdown, 1000);
    updateCountdown();

    setTimeout(() => {
        pingAll();
        setInterval(pingAll, 20000);
    }, 600);

    window.pingAll = pingAll;
</script>
</body>
</html>
