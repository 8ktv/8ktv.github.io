<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kraken Reborn</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    .header {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
    }

    .back-btn, .external-btn {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover, .external-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .iframe-container {
      width: 100%;
      height: 100%;
      padding-top: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">
    <i class="fa fa-arrow-left"></i> Go Back
  </a>
  <a href="https://catnip.at.ua/krakenreborn.html" target="_blank" class="external-btn">
    <i class="fa fa-external-link"></i> Open Direct
  </a>
</div>

<div class="iframe-container">
  <iframe src="https://catnip.at.ua/krakenreborn.html"></iframe>
</div>

</body>
</html>
